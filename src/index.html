<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Overflown - Un Juego de Puzzle Temático Dev</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <div class="main-panel">
        <div>
          <h1>🧱 Stack Overflown</h1>
          <div class="subtitle">¡Empareja los patrones de error antes de que desborde!</div>
        </div>
        <canvas id="gameCanvas" width="300" height="600"></canvas>
      </div>

      <div class="side-panel">
        <div class="info-section">
          <h3>Puntuación</h3>
          <div class="score" id="score">0</div>
          <div class="status" id="status">Jugando...</div>
        </div>

        <div class="info-section">
          <h3>Patrón Objetivo</h3>
          <div class="pattern-preview">
            <canvas id="patternCanvas" width="100" height="100"></canvas>
            <div class="pattern-name" id="patternName">Cargando...</div>
          </div>
        </div>

        <div class="info-section">
          <h3>Controles</h3>
          <div class="controls">
            <strong>←/→</strong> Mover<br />
            <strong>↑</strong> Rotar<br />
            <strong>↓</strong> Caída Suave<br />
            <strong>Espacio</strong> Caída Dura<br />
            <strong>P</strong> Pausa
          </div>
        </div>
      </div>
    </div>

    <div class="game-over" id="gameOver">
      <h2>¡DESBORDAMIENTO DE PILA!</h2>
      <p>Tu pila alcanzó el techo</p>
      <p>Puntuación Final: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Reiniciar</button>
    </div>

    <script src="patterns.js"></script>
    <script src="index.js"></script>
  </body>
</html>
